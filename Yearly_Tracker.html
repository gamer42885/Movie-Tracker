<script>
function formatRuntime(totalMinutes) {
    totalMinutes = Number(totalMinutes || 0);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return `${hours}h ${minutes}m`;
}

function parseRuntimeToMinutes(value) {
    if (value === null || value === undefined || value === "") return 0;
    if (typeof value === "number") return value;

    const str = String(value).trim().toLowerCase();

    if (/^\d+(\.\d+)?$/.test(str)) {
        return Number(str);
    }

    if (/^\d{1,2}:\d{1,2}$/.test(str)) {
        const [h, m] = str.split(":").map(Number);
        return (h * 60) + m;
    }

    const hourMatch = str.match(/(\d+)\s*(h|hr|hrs|hour|hours)/);
    const minuteMatch = str.match(/(\d+)\s*(m|min|mins|minute|minutes)/);

    const hours = hourMatch ? Number(hourMatch[1]) : 0;
    const minutes = minuteMatch ? Number(minuteMatch[1]) : 0;

    if (hours || minutes) {
        return (hours * 60) + minutes;
    }

    return 0;
}

function extractReleaseYear(value) {
    if (!value) return null;
    const match = String(value).match(/\b(18|19|20|21)\d{2}\b/);
    return match ? match[0] : null;
}

function normalizeMovieType(value) {
    const v = (value || "").trim().toLowerCase();
    if (v === "digital") return "blu-ray";
    if (v === "blu-ray/dvd") return "blu-ray";
    return v;
}

function isFinishedMovie(movie) {
    return !!(movie.ended && String(movie.ended).trim() !== "");
}

// -------------------- Render Dashboard --------------------
function renderDashboard() {
    const months = JSON.parse(localStorage.getItem("movieMonths")) || [];
    const movies = JSON.parse(localStorage.getItem("movies")) || [];
    const finishedMovies = movies.filter(isFinishedMovie);
    const container = document.getElementById("dashboard");

    container.innerHTML = "";

    const totalMovies = finishedMovies.length;
    const totalRuntime = finishedMovies.reduce((sum, m) => sum + parseRuntimeToMinutes(m.runtime), 0);
    const avgRating = finishedMovies.length
        ? (finishedMovies.reduce((sum, m) => sum + Number(m.rating || 0), 0) / finishedMovies.length).toFixed(2)
        : "0.00";

    const totalTheater = finishedMovies.filter(m => (m.type || "").trim().toLowerCase() === "theater").length;
    const totalStreaming = finishedMovies.filter(m => (m.type || "").trim().toLowerCase() === "streaming").length;
    const totalBluray = finishedMovies.filter(m => normalizeMovieType(m.type) === "blu-ray").length;
    const totalDvd = finishedMovies.filter(m => normalizeMovieType(m.type) === "dvd").length;

    const genreCount = {};
    finishedMovies.forEach(m => {
        if (!m.genres) return;
        m.genres.split(",").forEach(tag => {
            tag = tag.trim();
            if (tag) genreCount[tag] = (genreCount[tag] || 0) + 1;
        });
    });

    const topGenres = Object.entries(genreCount)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([g, c]) => `${g} (${c})`)
        .join(", ");

    document.getElementById("yearSummary").innerHTML = `
        <h3>Yearly Summary</h3>
        <p>Total Finished Movies: ${totalMovies}</p>
        <p>Total Theater: ${totalTheater}</p>
        <p>Total Streaming: ${totalStreaming}</p>
        <p>Total Blu-ray: ${totalBluray}</p>
        <p>Total DVD: ${totalDvd}</p>
        <p>Total Runtime: ${formatRuntime(totalRuntime)}</p>
        <p>Average Rating: ${avgRating}</p>
        <p>Top Genres / Franchises: ${topGenres || "N/A"}</p>
    `;

    months.forEach(m => {
        const monthMovies = finishedMovies.filter(movie => movie.month === m.value);
        const totalMonthMovies = monthMovies.length;
        const totalMonthRuntime = monthMovies.reduce((sum, movie) => sum + parseRuntimeToMinutes(movie.runtime), 0);
        const monthTheater = monthMovies.filter(movie => (movie.type || "").trim().toLowerCase() === "theater").length;
        const monthStreaming = monthMovies.filter(movie => (movie.type || "").trim().toLowerCase() === "streaming").length;
        const monthBluray = monthMovies.filter(movie => normalizeMovieType(movie.type) === "blu-ray").length;
        const monthDvd = monthMovies.filter(movie => normalizeMovieType(movie.type) === "dvd").length;

        const div = document.createElement("div");
        div.className = "summary-box";
        div.innerHTML = `
            <h3>${m.label}</h3>
            <p>Finished Movies: ${totalMonthMovies}</p>
            <p>Theater: ${monthTheater}</p>
            <p>Streaming: ${monthStreaming}</p>
            <p>Blu-ray: ${monthBluray}</p>
            <p>DVD: ${monthDvd}</p>
            <p>Runtime: ${formatRuntime(totalMonthRuntime)}</p>
        `;
        container.appendChild(div);
    });
}

renderDashboard();

// -------------------- Export Yearly PDF --------------------
document.getElementById("exportYearPdfBtn").addEventListener("click", () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const months = JSON.parse(localStorage.getItem("movieMonths")) || [];
    const movies = JSON.parse(localStorage.getItem("movies")) || [];
    const finishedMovies = movies.filter(isFinishedMovie);

    let y = 10;

    doc.setFontSize(18);
    doc.text("Yearly Movie Report", 10, y);
    y += 10;

    const totalMovies = finishedMovies.length;
    const totalRuntime = finishedMovies.reduce((sum, m) => sum + parseRuntimeToMinutes(m.runtime), 0);
    const avgRating = finishedMovies.length
        ? (finishedMovies.reduce((sum, m) => sum + Number(m.rating || 0), 0) / finishedMovies.length).toFixed(2)
        : "0.00";

    const totalTheater = finishedMovies.filter(m => (m.type || "").trim().toLowerCase() === "theater").length;
    const totalStreaming = finishedMovies.filter(m => (m.type || "").trim().toLowerCase() === "streaming").length;
    const totalBluray = finishedMovies.filter(m => normalizeMovieType(m.type) === "blu-ray").length;
    const totalDvd = finishedMovies.filter(m => normalizeMovieType(m.type) === "dvd").length;

    doc.setFontSize(12);
    doc.text(`Total Finished Movies: ${totalMovies}`, 10, y); y += 6;
    doc.text(`Total Theater: ${totalTheater}`, 10, y); y += 6;
    doc.text(`Total Streaming: ${totalStreaming}`, 10, y); y += 6;
    doc.text(`Total Blu-ray: ${totalBluray}`, 10, y); y += 6;
    doc.text(`Total DVD: ${totalDvd}`, 10, y); y += 6;
    doc.text(`Total Runtime: ${formatRuntime(totalRuntime)}`, 10, y); y += 6;
    doc.text(`Average Rating: ${avgRating}`, 10, y); y += 10;

    months.forEach(m => {
        if (y > 270) {
            doc.addPage();
            y = 10;
        }

        const monthMovies = finishedMovies.filter(movie => movie.month === m.value);
        const totalMonthMovies = monthMovies.length;
        const totalMonthRuntime = monthMovies.reduce((sum, movie) => sum + parseRuntimeToMinutes(movie.runtime), 0);
        const monthTheater = monthMovies.filter(movie => (movie.type || "").trim().toLowerCase() === "theater").length;
        const monthStreaming = monthMovies.filter(movie => (movie.type || "").trim().toLowerCase() === "streaming").length;
        const monthBluray = monthMovies.filter(movie => normalizeMovieType(movie.type) === "blu-ray").length;
        const monthDvd = monthMovies.filter(movie => normalizeMovieType(movie.type) === "dvd").length;

        doc.setFontSize(14);
        doc.text(m.label, 10, y); y += 6;
        doc.setFontSize(11);
        doc.text(`Finished Movies: ${totalMonthMovies}`, 10, y); y += 5;
        doc.text(`Theater: ${monthTheater}`, 10, y); y += 5;
        doc.text(`Streaming: ${monthStreaming}`, 10, y); y += 5;
        doc.text(`Blu-ray: ${monthBluray}`, 10, y); y += 5;
        doc.text(`DVD: ${monthDvd}`, 10, y); y += 5;
        doc.text(`Runtime: ${formatRuntime(totalMonthRuntime)}`, 10, y); y += 8;
    });

    doc.save("Yearly_Movie_Report.pdf");
});
</script>
