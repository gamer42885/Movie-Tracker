<script>
let tab = "Theater";

function getMovies() {
  const movies = JSON.parse(localStorage.getItem("movies")) || [];
  let changed = false;

  movies.forEach(movie => {
    const normalized = normalizeMovieType(movie.type);
    const proper =
      normalized === "blu-ray" ? "Blu-ray" :
      normalized === "dvd" ? "DVD" :
      normalized === "streaming" ? "Streaming" :
      "Theater";

    if ((movie.type || "") !== proper) {
      movie.type = proper;
      changed = true;
    }
  });

  if (changed) localStorage.setItem("movies", JSON.stringify(movies));
  return movies;
}

function getMovieSeriesData() {
  return JSON.parse(localStorage.getItem("movieSeriesData")) || [];
}

function getMovieCheckboxState() {
  return JSON.parse(localStorage.getItem("movieCheckboxState") || "{}");
}

function parseRuntimeToMinutes(value) {
  if (value === null || value === undefined || value === "") return 0;
  if (typeof value === "number") return value;

  const str = String(value).trim().toLowerCase();

  if (/^\d+(\.\d+)?$/.test(str)) return Number(str);

  if (/^\d{1,2}:\d{1,2}$/.test(str)) {
    const [h, m] = str.split(":").map(Number);
    return (h * 60) + m;
  }

  const hourMatch = str.match(/(\d+)\s*(h|hr|hrs|hour|hours)/);
  const minuteMatch = str.match(/(\d+)\s*(m|min|mins|minute|minutes)/);

  const hours = hourMatch ? Number(hourMatch[1]) : 0;
  const minutes = minuteMatch ? Number(minuteMatch[1]) : 0;

  if (hours || minutes) return (hours * 60) + minutes;

  return 0;
}

function getMovieRuntimeMinutes(movie) {
  return parseRuntimeToMinutes(
    movie.runtime ??
    movie.length ??
    movie.totalRuntime ??
    movie.movieRuntime ??
    movie.minutes ??
    movie.duration ??
    movie.time ??
    0
  );
}

function formatRuntime(totalMinutes) {
  totalMinutes = Number(totalMinutes || 0);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${hours}h ${minutes}m`;
}

function monthLabelText(monthValue) {
  if (!monthValue) return "";
  const [year, month] = monthValue.split("-");
  const date = new Date(Number(year), Number(month) - 1, 1);
  return date.toLocaleString("default", { month: "long", year: "numeric" });
}

function normalizeMovieType(type) {
  const value = (type || "").trim().toLowerCase();
  if (value === "digital") return "blu-ray";
  if (value === "blu-ray/dvd") return "blu-ray";
  return value;
}

function matchesCollectionCardType(format) {
  const f = normalizeMovieType(format);
  if (f === "movie" || f === "theater") return "movie";
  if (f === "streaming") return "streaming";
  if (f === "dvd") return "dvd";
  return "bluray";
}

function updateDashboard() {
  const movies = getMovies();
  const seriesData = getMovieSeriesData();
  const checkboxState = getMovieCheckboxState();
  const currentMonth = new Date().toISOString().slice(0, 7);

  let collectionMovies = 0;
  let collectionStreaming = 0;
  let collectionBluray = 0;
  let collectionDvd = 0;

  seriesData.forEach((series, sIndex) => {
    (series.books || []).forEach((movie, bIndex) => {
      const haveId = `movie-have-${sIndex}-${bIndex}`;
      if (checkboxState[haveId]) {
        const type = matchesCollectionCardType(movie.format);
        if (type === "movie") collectionMovies++;
        else if (type === "streaming") collectionStreaming++;
        else if (type === "dvd") collectionDvd++;
        else collectionBluray++;
      }
    });
  });

  document.getElementById("collectionMovies").textContent = collectionMovies;
  document.getElementById("collectionStreaming").textContent = collectionStreaming;
  document.getElementById("collectionBluray").textContent = collectionBluray;
  document.getElementById("collectionDvd").textContent = collectionDvd;

  const thisMonthMovies = movies.filter(m => m.month === currentMonth);

  document.getElementById("monthMoviesCount").textContent =
    thisMonthMovies.filter(m => normalizeMovieType(m.type) === "theater").length;

  document.getElementById("monthStreamingCount").textContent =
    thisMonthMovies.filter(m => normalizeMovieType(m.type) === "streaming").length;

  document.getElementById("monthBlurayCount").textContent =
    thisMonthMovies.filter(m => normalizeMovieType(m.type) === "blu-ray").length;

  document.getElementById("monthDvdCount").textContent =
    thisMonthMovies.filter(m => normalizeMovieType(m.type) === "dvd").length;

  document.getElementById("inProgressTheater").textContent =
    thisMonthMovies.filter(m => m.started && !m.ended && normalizeMovieType(m.type) === "theater").length;

  document.getElementById("inProgressStreaming").textContent =
    thisMonthMovies.filter(m => m.started && !m.ended && normalizeMovieType(m.type) === "streaming").length;

  document.getElementById("inProgressBluray").textContent =
    thisMonthMovies.filter(m => m.started && !m.ended && normalizeMovieType(m.type) === "blu-ray").length;

  document.getElementById("inProgressDvd").textContent =
    thisMonthMovies.filter(m => m.started && !m.ended && normalizeMovieType(m.type) === "dvd").length;

  document.getElementById("finishedTheater").textContent =
    thisMonthMovies.filter(m => m.ended && normalizeMovieType(m.type) === "theater").length;

  document.getElementById("finishedStreaming").textContent =
    thisMonthMovies.filter(m => m.ended && normalizeMovieType(m.type) === "streaming").length;

  document.getElementById("finishedBluray").textContent =
    thisMonthMovies.filter(m => m.ended && normalizeMovieType(m.type) === "blu-ray").length;

  document.getElementById("finishedDvd").textContent =
    thisMonthMovies.filter(m => m.ended && normalizeMovieType(m.type) === "dvd").length;

  populateMonths();
  renderMonth();
  renderOverview();
}

function populateMonths() {
  const select = document.getElementById("monthSelect");
  const movies = getMovies();
  const months = [...new Set(movies.map(m => m.month).filter(Boolean))];
  const current = new Date().toISOString().slice(0, 7);

  if (!months.includes(current)) months.unshift(current);

  select.innerHTML = "";
  months.sort((a, b) => b.localeCompare(a));

  months.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = monthLabelText(m);
    select.appendChild(opt);
  });

  if (months.length) {
    select.value = months.includes(current) ? current : months[0];
  }
}

function renderMonth() {
  const selectedMonth = document.getElementById("monthSelect").value;
  const movies = getMovies().filter(m => m.month === selectedMonth);

  document.getElementById("monthLabel").textContent = monthLabelText(selectedMonth);

  const theater = movies.filter(m => normalizeMovieType(m.type) === "theater");
  const streaming = movies.filter(m => normalizeMovieType(m.type) === "streaming");
  const bluray = movies.filter(m => normalizeMovieType(m.type) === "blu-ray");
  const dvd = movies.filter(m => normalizeMovieType(m.type) === "dvd");

  const theaterRuntime = theater.reduce((sum, m) => sum + getMovieRuntimeMinutes(m), 0);
  const streamingRuntime = streaming.reduce((sum, m) => sum + getMovieRuntimeMinutes(m), 0);
  const blurayRuntime = bluray.reduce((sum, m) => sum + getMovieRuntimeMinutes(m), 0);
  const dvdRuntime = dvd.reduce((sum, m) => sum + getMovieRuntimeMinutes(m), 0);

  const totalRuntime = movies.reduce((sum, m) => sum + getMovieRuntimeMinutes(m), 0);

  const ratedMovies = movies.filter(m => m.rating !== "" && m.rating !== null && m.rating !== undefined);
  const avgRating = ratedMovies.length
    ? (ratedMovies.reduce((sum, m) => sum + Number(m.rating || 0), 0) / ratedMovies.length).toFixed(2)
    : "0.00";

  document.getElementById("monthTheater").textContent = theater.length;
  document.getElementById("monthStreaming").textContent = streaming.length;
  document.getElementById("monthBluray").textContent = bluray.length;
  document.getElementById("monthDvd").textContent = dvd.length;

  document.getElementById("monthTheaterRuntime").textContent = formatRuntime(theaterRuntime);
  document.getElementById("monthStreamingRuntime").textContent = formatRuntime(streamingRuntime);
  document.getElementById("monthBlurayRuntime").textContent = formatRuntime(blurayRuntime);
  document.getElementById("monthDvdRuntime").textContent = formatRuntime(dvdRuntime);

  document.getElementById("monthTotalRuntime").textContent = formatRuntime(totalRuntime);
  document.getElementById("monthAvgRating").textContent = avgRating;
}

function getBadgeClass(type) {
  const t = normalizeMovieType(type);
  if (t === "theater") return "badge-theater";
  if (t === "streaming") return "badge-streaming";
  if (t === "dvd") return "badge-dvd";
  return "badge-bluray";
}

function renderOverview() {
  const currentEl = document.getElementById("current");
  const finishedEl = document.getElementById("finished");
  currentEl.innerHTML = "";
  finishedEl.innerHTML = "";

  const movies = getMovies();

  const currentMovies = movies
    .filter(m => normalizeMovieType(m.type) === normalizeMovieType(tab) && m.started && !m.ended)
    .sort((a, b) => (b.started || "").localeCompare(a.started || ""));

  const finishedMovies = movies
    .filter(m => normalizeMovieType(m.type) === normalizeMovieType(tab) && m.ended)
    .sort((a, b) => (b.ended || "").localeCompare(a.ended || ""))
    .slice(0, 6);

  if (!currentMovies.length) {
    currentEl.innerHTML = `<div class="empty">No currently watching ${tab.toLowerCase()} titles.</div>`;
  } else {
    currentMovies.forEach(movie => {
      currentEl.innerHTML += `
        <div class="reading-card">
          ${movie.cover ? `<img src="${movie.cover}" alt="${movie.title}">` : ""}
          <h4>${movie.title}</h4>
          <p>${movie.director || "-"}</p>
          <p>Started: ${movie.started || "-"}</p>
          <p>Runtime: ${movie.runtime || movie.length || movie.totalRuntime || movie.movieRuntime || movie.minutes || movie.duration || "-"}</p>
          <span class="badge ${getBadgeClass(movie.type)}">${normalizeMovieType(movie.type) === "blu-ray" ? "Blu-ray" : normalizeMovieType(movie.type) === "dvd" ? "DVD" : normalizeMovieType(movie.type) === "streaming" ? "Streaming" : "Theater"}</span>
        </div>
      `;
    });
  }

  if (!finishedMovies.length) {
    finishedEl.innerHTML = `<div class="empty">No recently finished ${tab.toLowerCase()} titles.</div>`;
  } else {
    finishedMovies.forEach(movie => {
      finishedEl.innerHTML += `
        <div class="reading-card">
          ${movie.cover ? `<img src="${movie.cover}" alt="${movie.title}">` : ""}
          <h4>${movie.title}</h4>
          <p>${movie.director || "-"}</p>
          <p>Finished: ${movie.ended || "-"}</p>
          <p>Rating: ${movie.rating || 0} ★</p>
          <span class="badge ${getBadgeClass(movie.type)}">${normalizeMovieType(movie.type) === "blu-ray" ? "Blu-ray" : normalizeMovieType(movie.type) === "dvd" ? "DVD" : normalizeMovieType(movie.type) === "streaming" ? "Streaming" : "Theater"}</span>
        </div>
      `;
    });
  }
}

document.getElementById("monthSelect").addEventListener("change", renderMonth);

document.querySelectorAll(".tab-button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    tab = btn.dataset.type;
    renderOverview();
  });
});

updateDashboard();
</script>
